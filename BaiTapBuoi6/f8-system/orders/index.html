<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
    </head>
    <body>
        <h1 style="color: rgb(70, 60, 100)">ORDERS PAGE</h1>
        <!--Phan tu nay hoi tu tag(h2) + class(.title) + id(#special) + inline style
    Selector thang: inline style vi do uu tien cao nhat
    Mau hien thi: green-->
        <h2 class="title" id="special" style="color: green">Danh sach don hang</h2>
        <p style="color: rgb(90, 70, 200)">Don hang 001</p>
        <p style="color: rgb(80, 90,40)">Don hang 002</p>
        <p class="highlight">Don hang 003</p>
        <p class="highlight">Don hang 004</p>
        <!--phan tu h2 co ca .title #special inline style ==> inline style thang-->
    </body>
</html>
