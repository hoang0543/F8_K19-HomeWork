<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Title</title>
        <style>
            /*CSS reset*/
            body {
                font-family: Arial, sans-serif;
                margin: 0;
            }

            /*CSS nút mở modal*/
            .open-btn {
                display: inline-block;
                color: #ffffff;
                background-color: #3b82f6;
                font-size: 1.5em;
                padding: 10px;
                margin: 50px;
            }

            /*CSS nút đóng thông báo*/
            .close-btn {
                background-color: #ef4444;
                color: #ffffff;
                font-size: 1.5em;
                padding: 10px;
            }

            /*CSS phần nội dung thông báo*/
            p {
                font-size: 1.5em;
                padding: 50px;
            }

            /*CSS nền màn hình khi thông báo hiện ra*/
            .overlay {
                display: none;
                background-color: rgba(0, 0, 0, 0.5);
                width: 100%;
                height: 100vh;
                padding-top: 100px;
            }

            /*CSS nền trong thông báo*/
            .modal {
                display: none;
                width: 50vw;
                height: 30vh;
                color: #333333;
                background-color: #ffffff;
                margin: 100px auto;
                text-align: center;
            }

            /*CSS hoạt động mở-đóng thông báo*/
            #modal-toggle:checked~.overlay {
                display: block;
            }

            #modal-toggle:checked~.overlay .modal {
                display: block;
            }
        </style>
    </head>
    <body>
        <label for="modal-toggle" class="open-btn">Mở modal</label>
        <input type="checkbox" id="modal-toggle" hidden>
        <label for="modal-toggle" class="overlay">
            <div class="modal">
                <p>Đây là nội dung thông báo!</p>
                <label for="modal-toggle" class="close-btn">Đóng</label>
            </div>
        </label>
    </body>
</html>
